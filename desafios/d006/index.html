<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <h1>Tags em Html5</h1>
    <p>Em Html5, podemos inserir os elementos da lista a seguir.Passe o mouse na tela sobre os termos para decobrir qual tag devera ultilizar em cada caso</p>
    <ul>
       <li title="Use a tag &lt;P&gt;"> Paragrafos</li>
       <li title="Use a tag &lt;h1 ate h6&gt; " >Títulos</li>
       <li title="Use a tag &lt;img&gt; ">Imagens</li>
       <li title="Use a tag &lt;abbr&gt;">Abreviacoes</li>
       <li title="Use a tag &lt;ol&gt;">listas numeradas</li>
       <li title="Use a tag &lt;dl&gt; ">listas com demarcadores</li>

    </ul>
    
</body>
