<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela n2</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            width: 400px;
            border-collapse: collapse;
        }
        td,th{
            border:1px solid black;
            padding: 10px;
        }
        thead th{
            background-color: lightgray;
            padding: 10px;
        }

            background-color: lightgray;
            padding: 10px;
        }

</head>

                </tr>
        </thead>

            </tr>
            <tr>
                <th>Física</th>

                <td>0.0</td>
            </tr>
            <tr>
                    <th colspan="4" class="m">Média de Exatas</th>

            </tr>
             <tr>

             </tr>
             <tr>
                <th colspan="4" class="m">Média de Humanas</th>

             </tr>
        </tbody>
    </table>
</body>
</html>
