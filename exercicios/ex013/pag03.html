<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos de midias</title>
</head>
<body>
    <h1> Reproduzindo Audios</h1>
    <p>vamos aprender a reproduzir audios em html5</p>
    <audio src="midias/guanacast-33.mp3"controls autoplay></audio>
    <p>outra forma de colocar um audio</p>
    <audio preload="metadata"autoplay controls loop>
        <source src="midias/guanacast-33.mp3" type="audio/mpeg">
        <source src="midias/guanacast-33.ogg" type="audio/ogg">
        <source src="midias/guanacast-33.wav" type="audio/wav">
        <p>infelizmente seu navegador nao conseque reproduzir audio ></p><a href="midias/guanacast-33.mp3">Clique aquir para fazer o download do adio</a>
    </audio>
</body>
</html>
