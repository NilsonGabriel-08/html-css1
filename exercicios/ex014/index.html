<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos em HTML5</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p>Este video está hospedado em meu proprio servidor</p>
    <video width="500"  controls autoplay loop>
       <source src="midia/Meu-Video.Mp4.mp4" type="video/mp4">
       <source src="midia/Meu-Video1.mkv.mkv" type="video/mkv">
       <source src="midia/meu-vidio.webm.webm" type="video/webm">
       <p>seu navegador nao tem compatibilidade com reproducao de video</p>
    </video>

    <h1>Inserindo videos do youtube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/i7L19SOqbNM?si=qmQ0uh_-HAoQHGCE" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
