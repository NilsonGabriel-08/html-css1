<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <fieldset>
        <legend>Esportes Favoritos</legend>
        <input type="checkbox" name="basquete" id="basquete"> <label for="basquete">basquete</label> <br>
        <input type="checkbox" name="futebol" id="futebol"> <label for="futebol">futebol</label> <br>
        <input type="checkbox" name="tenis" id="tenis"> <label for="tenis">tenis</label> <br>
        <input type="checkbox" name="natacao" id="natacao"> <label for="natacao">nataçao</label> <br>
    </fieldset>
</body>
</html>
