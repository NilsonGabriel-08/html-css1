<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lidando com tabelas grandes</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            width:400px;
        }
        td,th{
            border:1px solid black;
            padding: 10px;
        }
        th{
            background-color: lightgray;
        }
        td.n{
            text-align:right;
        }
    </style>
</head>
<body>
    <table>
        <caption>Populaçao das unidades federativas brasileiras</caption>
        <thead>
            <tr>
                <th scope="col">Estado</th>
                <th scope="col">Populaçao</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Sao Paulo</td>
                <td class="n">49 919 049</td>
                <tr>
                    <td>Minas Gerais</td>
                    <td class="n">21 168 791</td>
                </tr>
                <tr>
                    <td>Rio de Janeiro</td>
                    <td class="n">17 264 943</td>
                </tr>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th scope="row">Total de habitantes</th>
                <th scope="row">0000</th>
            </tr>
        </tfoot>
    </table>
</body>
</html>
